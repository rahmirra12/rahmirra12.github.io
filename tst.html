<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab 切换示例</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 20px;
        }

        /* 按钮样式 */
        .tab-btn {
            padding: 10px 18px;
            margin-right: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #f2f2f2;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

            /* 激活状态 */
            .tab-btn.active {
                background: #007aff;
                color: white;
                border-color: #007aff;
            }

        /* 内容区域 */
        .tab-content {
            display: none;
            margin-top: 20px;
            font-size: 18px;
        }

            .tab-content.active {
                display: block;
            }
    </style>
</head>

<body>

    <h2>Tab 切换示例（iPhone Safari 兼容）</h2>

    <!-- 按钮 -->
    <button class="tab-btn active" data-target="tab1">按钮 1</button>
    <button class="tab-btn" data-target="tab2">按钮 2</button>
    <button class="tab-btn" data-target="tab3">按钮 3</button>

    <!-- 内容 -->
    <div id="tab1" class="tab-content active">这里是内容 1</div>
    <div id="tab2" class="tab-content">这里是内容 2</div>
    <div id="tab3" class="tab-content">这里是内容 3</div>

    <script>
        const buttons = document.querySelectorAll(".tab-btn");
        const contents = document.querySelectorAll(".tab-content");

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                // 清除所有按钮激活状态
                buttons.forEach(b => b.classList.remove("active"));
                // 激活当前按钮
                btn.classList.add("active");

                // 隐藏所有内容
                contents.forEach(c => c.classList.remove("active"));
                // 显示对应内容
                document.getElementById(btn.dataset.target).classList.add("active");
            });
        });
    </script>

</body>
</html>
